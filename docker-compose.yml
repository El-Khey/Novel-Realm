# =====================================================================
#  Fichier de base = mode PRODUCTION (images construites, figées).
#  Décrit les 3 services : base de données + API + front.
#  Le mode DEV (hot-reload) ajoute par-dessus docker-compose.dev.yml.
#
#  Version "2.4" choisie volontairement : elle est pleinement supportée
#  par docker-compose v1 (installé sur cette machine) ET gère la
#  condition "service_healthy" dans depends_on (l'API n'attaque la base
#  qu'une fois qu'elle répond vraiment).
# =====================================================================
version: "2.4"

services:
  # ── Base de données PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16            # version figée = environnement reproductible
    container_name: anama-postgres
    environment:
      POSTGRES_DB: anama
      POSTGRES_USER: anama
      POSTGRES_PASSWORD: anama
    ports:
      # "port_machine : port_conteneur". 5433 côté machine pour éviter un
      # conflit avec un autre Postgres déjà sur 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persiste les données
    healthcheck:                  # Docker teste vraiment que la base répond
      test: ["CMD-SHELL", "pg_isready -U anama -d anama"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Spring Boot ────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile      # prod (le mode dev surcharge par Dockerfile.dev)
    container_name: anama-api
    depends_on:
      postgres:
        condition: service_healthy  # attend que la base soit prête
    environment:
      # À l'intérieur du réseau Docker, l'API joint la base via le NOM du
      # service ("postgres") sur son port interne 5432 (pas 5433 ni localhost).
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: anama
      DB_PASSWORD: anama
    ports:
      - "8080:8080"

  # ── Front (servi par nginx en prod) ────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile      # prod (le mode dev surcharge par Dockerfile.dev)
    container_name: anama-web
    depends_on:
      - api
    ports:
      # Toujours exposé sur 5173 côté machine, dans les deux modes, pour que
      # l'origine du navigateur reste http://localhost:5173 (cohérent avec la
      # config CORS de l'API). Côté conteneur : 80 (nginx en prod, Vite en dev).
      - "5173:80"

volumes:
  postgres_data:
