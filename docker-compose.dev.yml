# =====================================================================
#  Surcharge de DÉVELOPPEMENT (hot-reload).
#  S'utilise EN PLUS du fichier de base :
#     docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#  (le Makefile le fait pour toi avec `make dev`).
#
#  Ce qui change vs la base :
#   - on construit avec les Dockerfile.dev (serveurs de dev, pas les images
#     de prod) ;
#   - on monte le code source en VOLUME → toute modif est visible dans le
#     conteneur sans reconstruire l'image.
# =====================================================================
services:
  api:
    build:
      dockerfile: Dockerfile.dev
    environment:
      # Active le profil Spring "dev" : réservé aux réglages spécifiques au
      # développement (ex. un futur seed de données de test).
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./apps/api:/app           # le code source (modifs visibles direct)
      - gradle_cache:/root/.gradle # cache des dépendances Gradle (sinon re-téléchargé à chaque fois)
      # Cache PROJET Gradle propre au conteneur : évite que son bootRun et le
      # Gradle de l'IDE hôte se disputent le verrou de ./apps/api/.gradle
      # ("Timeout waiting to lock ... another Gradle instance"). Même raison que
      # le cache dédié de `make ingest`. (build/ reste partagé pour le hot-reload.)
      - /app/.gradle

  web:
    build:
      dockerfile: Dockerfile.dev
    environment:
      - VITE_USE_POLLING=true     # active la détection de fichiers en polling (Docker/WSL2)
    volumes:
      - ./apps/web:/app           # le code source (HMR)
      - /app/node_modules         # garde le node_modules de l'IMAGE (pas celui de l'hôte)

volumes:
  gradle_cache:
