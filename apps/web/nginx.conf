# Configuration nginx pour servir le front en production.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback : pour une Single Page App, toute URL inconnue doit
    # renvoyer index.html (c'est React Router qui gérera la route côté client).
    # Indispensable dès qu'on aura plusieurs pages (/novels/:id, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
