spring:
  application:
    name: novelrealm-api

  # ── Connexion à la base PostgreSQL ──────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/novelrealm
    username: ${DB_USER:novelrealm}
    password: ${DB_PASSWORD:novelrealm}

  # ── JPA / Hibernate (la couche objet ↔ base) ───────────────────
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

  # ── Upload de fichiers (avatars, bannières) ────────────────────
  # Limite « transport » du multipart ; les limites métier (2 Mo avatar,
  # 4 Mo bannière) sont vérifiées dans FileStorageService.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # ── Envoi d'emails (SMTP Gmail) ────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Connexion Google (OAuth2) ──────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# ── Configuration applicative ───────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  # Dossier disque des uploads (relatif au dossier de travail de l'app).
  upload-dir: ${UPLOAD_DIR:uploads}

  # ── Authentification JWT (mobile + web) ────────────────────────
  # Un seul token signé (HS256) : header `Authorization: Bearer` côté mobile,
  # cookie httpOnly côté web. Le secret DOIT faire ≥ 32 octets (256 bits).
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-in-prod-min-32-bytes-long!!}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}   # 24 h
    cookie-name: ${JWT_COOKIE_NAME:access_token}
    cookie-secure: ${JWT_COOKIE_SECURE:false}             # true en prod (HTTPS)
    cookie-same-site: ${JWT_COOKIE_SAMESITE:Lax}          # None en prod (domaines ≠)

server:
  port: 8080

logging:
  level:
    "[org.hibernate.SQL]": debug