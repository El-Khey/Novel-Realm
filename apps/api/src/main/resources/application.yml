spring:
  application:
    name: novelrealm-api

  # ── Connexion à la base PostgreSQL ──────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/novelrealm
    username: ${DB_USER:novelrealm}
    password: ${DB_PASSWORD:novelrealm}

  # ── JPA / Hibernate (la couche objet ↔ base) ───────────────────
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ── Envoi d'emails (SMTP Gmail) ────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug